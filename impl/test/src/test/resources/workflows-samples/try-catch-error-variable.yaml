document:
  dsl: '1.0.0'
  namespace: test
  name: try-catch-error-variable
  version: '0.1.0'
do:
  - attemptTask:
      try:
        - failingTask:
            raise:
              error:
                type: https://example.com/errors/transient
                detail: Javierito was here!
                status: 503
      catch:
        as: caughtError
        do:
          - handleError:
              set:
                errorMessage: ${$caughtError.details}