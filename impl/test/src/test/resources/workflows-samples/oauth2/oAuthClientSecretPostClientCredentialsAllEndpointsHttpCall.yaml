document:
  dsl: '1.0.0-alpha5'
  namespace: test
  name: oauth2-authentication-secret-client-credentials-all-endpoints
  version: '0.0.1'
do:
  - getPet:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:8081/hello
          authentication:
            oauth2:
              authority: http://localhost:8888/realms/test-realm
              endpoints:
                token: protocol/openid-connect/token
                revocation: protocol/openid-connect/revoke
                introspection: protocol/openid-connect/introspect
              grant: client_credentials
              client:
                id: serverless-workflow
                secret: dummy-secret-for-tests
              issuers:
                - http://localhost:8888/realms/test-realm
