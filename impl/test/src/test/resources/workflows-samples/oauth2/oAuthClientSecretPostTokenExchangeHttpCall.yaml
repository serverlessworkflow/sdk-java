document:
  dsl: '1.0.0-alpha5'
  namespace: test
  name: oauth2-authentication-token-exchange
  version: '0.0.1'
do:
  - getPet:
      call: http
      with:
        method: get
        endpoint:
          uri: http://localhost:8081/hello
          authentication:
            oauth2:
              authority: http://localhost:8888/realms/test-realm
              endpoints:
                token: protocol/openid-connect/token
              grant: urn:ietf:params:oauth:grant-type:token-exchange
              client:
                id: serverless-workflow
                secret: dummy-secret-for-tests
              subject:
                token: subject-token-value
                type: urn:ietf:params:oauth:token-type:access_token
              actor:
                token: actor-token-value
                type: urn:ietf:params:oauth:token-type:access_token
              issuers:
                - http://localhost:8888/realms/test-realm
