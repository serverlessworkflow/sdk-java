document:
  dsl: '1.0.0'
  namespace: test
  name: try-catch-not-match-details
  version: '0.1.0'
do:
    - attemptTask:
        try:
            - failingTask:
                    raise:
                        error:
                            type: https://example.com/errors/security
                            status: 403
                            detail: Enforcement Failure - invalid email
        catch:
            errors:
                with:
                    type: https://example.com/errors/security
                    status: 403
                    details: User not found in tenant catalog
 