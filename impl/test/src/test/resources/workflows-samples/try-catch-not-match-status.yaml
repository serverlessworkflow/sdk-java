document:
  dsl: '1.0.0'
  namespace: test
  name: try-catch-not-match-status
  version: '0.1.0'
do:
  - attemptTask:
      try:
        - failingTask:
            raise:
              error:
                  type: https://example.com/errors/transient
                  status: 503
      catch:
        errors:
            with:
               type: https://example.com/errors/transient
               status: 403